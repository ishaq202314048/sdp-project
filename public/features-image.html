<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackTroop Features</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 675px;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #020617 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Glow effects */
        .glow-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
        }
        .glow-2 {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            bottom: -80px;
            right: -80px;
            border-radius: 50%;
        }

        /* Grid pattern */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 6px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 48px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 0 60px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
        }

        .feature-card:nth-child(1)::before { background: linear-gradient(90deg, transparent, #10b981, transparent); }
        .feature-card:nth-child(2)::before { background: linear-gradient(90deg, transparent, #3b82f6, transparent); }
        .feature-card:nth-child(3)::before { background: linear-gradient(90deg, transparent, #a855f7, transparent); }
        .feature-card:nth-child(4)::before { background: linear-gradient(90deg, transparent, #f59e0b, transparent); }
        .feature-card:nth-child(5)::before { background: linear-gradient(90deg, transparent, #ef4444, transparent); }
        .feature-card:nth-child(6)::before { background: linear-gradient(90deg, transparent, #06b6d4, transparent); }
        .feature-card:nth-child(7)::before { background: linear-gradient(90deg, transparent, #ec4899, transparent); }

        .icon-circle {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 24px;
        }

        .feature-card:nth-child(1) .icon-circle { background: rgba(16, 185, 129, 0.15); }
        .feature-card:nth-child(2) .icon-circle { background: rgba(59, 130, 246, 0.15); }
        .feature-card:nth-child(3) .icon-circle { background: rgba(168, 85, 247, 0.15); }
        .feature-card:nth-child(4) .icon-circle { background: rgba(245, 158, 11, 0.15); }
        .feature-card:nth-child(5) .icon-circle { background: rgba(239, 68, 68, 0.15); }
        .feature-card:nth-child(6) .icon-circle { background: rgba(6, 182, 212, 0.15); }
        .feature-card:nth-child(7) .icon-circle { background: rgba(236, 72, 153, 0.15); }

        .feature-name {
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Second row centered */
        .features-row-2 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 16px 180px 0;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            color: #475569;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="grid-bg"></div>

    <div class="content">
        <div class="badge">
            🛡️ Military Grade Solution
        </div>
        <h1>TROOP TRACK</h1>
        <p class="subtitle">Soldier's Fitness Assessment & Monitoring System</p>

        <div class="features-grid">
            <div class="feature-card">
                <div class="icon-circle">🏋️</div>
                <div class="feature-name">Fitness Plans</div>
            </div>
            <div class="feature-card">
                <div class="icon-circle">📅</div>
                <div class="feature-name">IPFT Scheduling</div>
            </div>
            <div class="feature-card">
                <div class="icon-circle">📄</div>
                <div class="feature-name">PDF Reports</div>
            </div>
            <div class="feature-card">
                <div class="icon-circle">🔔</div>
                <div class="feature-name">Notifications</div>
            </div>
        </div>

        <div class="features-row-2">
            <div class="feature-card">
                <div class="icon-circle">📈</div>
                <div class="feature-name">Progress Charts</div>
            </div>
            <div class="feature-card">
                <div class="icon-circle">⬇️</div>
                <div class="feature-name">PDF Downloads</div>
            </div>
            <div class="feature-card">
                <div class="icon-circle">✅</div>
                <div class="feature-name">Soldier Approval</div>
            </div>
        </div>
    </div>

    <div class="footer">Built for Operational Readiness</div>
</body>
</html>
